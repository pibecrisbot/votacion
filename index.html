<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 15px; margin: 10px; font-size: 18px; }
input { padding: 10px; font-size: 16px; }
</style>
</head>

<body>
<iframe name="hidden_iframe" style="display:none;"></iframe>
  
<h2>Votación Centro de Estudiantes</h2>

<input id="codigo" placeholder="Ingresa tu código"><br><br>

<button onclick="votar('Apruebo')">Apruebo</button>
<button onclick="votar('Rechazo')">Rechazo</button>

<p id="mensaje"></p>
<p>Total votos: <span id="contador">0</span></p>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw_bmcpQgFeIXT_aBt2ZSvJqis4M4iJdWhkUcVp7gad5uYkSxDyOEAb48E1izZknMct/exec";

function votar(opcion) {
  const codigo = document.getElementById("codigo").value;

  if (!codigo) {
    mensaje.textContent = "Ingresa tu código";
    return;
  }

  mensaje.textContent = "Enviando voto...";

  const form = document.createElement("form");
  form.method = "POST";
  form.action = scriptURL;
  form.target = "hidden_iframe";

  const inputCodigo = document.createElement("input");
  inputCodigo.name = "codigo";
  inputCodigo.value = codigo;

  const inputVoto = document.createElement("input");
  inputVoto.name = "voto";
  inputVoto.value = opcion;

  form.appendChild(inputCodigo);
  form.appendChild(inputVoto);

  document.body.appendChild(form);
  form.submit();

  mensaje.textContent = "✅ Voto enviado";
}

function cargarContador() {
  fetch(scriptURL + "?contador=true")
    .then(res => res.json())
    .then(data => {
      document.getElementById("contador").textContent = data.total;
    });
}

cargarContador();

</script>

</body>
</html>
</body>
</html>
